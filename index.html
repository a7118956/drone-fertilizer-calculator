<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>無人機施肥計算器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans TC','Segoe UI',sans-serif;padding:24px}
.pw-card{width:420px;max-width:100%;border-radius:18px;border:1.5px solid;padding:42px 36px 36px;box-shadow:0 8px 40px rgba(0,0,0,.15);animation:fu .4s ease}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:20px;font-weight:700;margin-bottom:8px;text-align:center}
.pw-sub{font-size:13px;text-align:center;margin-bottom:28px;line-height:1.6}
.lbl{font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:6px}
input[type=password]{width:100%;padding:11px 14px;border:1.5px solid;border-radius:9px;font-size:14px;outline:none;margin-bottom:14px;transition:border .2s}
input[type=password]:focus{border-color:#4f8ef7;box-shadow:0 0 0 3px rgba(79,142,247,.15)}
.rem-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.rem-row input{width:auto;margin:0}
.rem-row label{margin:0;font-size:12px;color:#64748b}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px}
.btn:hover{opacity:.9}
.err{font-size:13px;text-align:center;margin-top:10px;min-height:20px}
.sp{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
body{background:#0f1117}.pw-card{background:#161b27;border-color:#2a3347}h1,.pw-sub{color:#e2e8f0}.pw-sub{color:#94a3b8}input{background:#1e2535;border-color:#2a3347;color:#e2e8f0}.err{color:#f87171}
</style>
</head>
<body>
<div class="pw-card">
  <h1>🔒 無人機施肥計算器</h1>
  <p class="pw-sub">此頁面受密碼保護，請輸入密碼以繼續</p>
  <span class="lbl">密碼（Passphrase）</span>
  <input type="password" id="pw" placeholder="請輸入密碼" autocomplete="current-password">
  <div class="rem-row"><input type="checkbox" id="rem"><label for="rem">記住密碼 7 天</label></div>
  <button class="btn" onclick="unlock()"><span id="sp" class="sp"></span><span id="bt">🔓 解鎖</span></button>
  <p class="err" id="err"></p>
</div>

function u(s){const b=atob(s);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function dk(pw,salt){const e=new TextEncoder();const k=await crypto.subtle.importKey('raw',e.encode(pw),{name:'PBKDF2'},false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:I,hash:'SHA-256'},k,{name:'AES-CBC',length:256},false,['decrypt']);}
async function unlock(){
  const pw=document.getElementById('pw').value;
  if(!pw){document.getElementById('err').textContent='請輸入密碼';return;}
  document.getElementById('sp').style.display='block';document.getElementById('bt').style.display='none';document.getElementById('err').textContent='';
  try{
    const k=await dk(pw,u(S));const p=await crypto.subtle.decrypt({name:'AES-CBC',iv:u(V)},k,u(C));
    const html=new TextDecoder().decode(p);
    if(R>0&&document.getElementById('rem')?.checked){try{localStorage.setItem('_scp',JSON.stringify({pw,exp:Date.now()+R*864e5}));}catch(e){}}
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById('err').textContent='密碼錯誤，請重試。';document.getElementById('sp').style.display='none';document.getElementById('bt').style.display='inline';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
(async()=>{if(R<=0)return;try{const s=JSON.parse(localStorage.getItem('_scp')||'null');if(s&&s.exp>Date.now()){document.getElementById('pw').value=s.pw;await unlock();}}catch(e){}})();
